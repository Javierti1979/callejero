<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado - Bomberos Madrid</title>
    <style>
        :root { --primary: #d32f2f; --secondary: #1976d2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Pantalla de Login */
        #login-overlay { position: fixed; inset: 0; background: var(--primary); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        #login-overlay input { padding: 12px; border-radius: 8px; border: none; width: 250px; margin-top: 20px; text-align: center; font-size: 1.1em; }
        
        /* Estructura Principal */
        header { background: #b71c1c; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; height: 50px; box-sizing: border-box; }
        main { display: flex; flex: 1; overflow: hidden; }

        /* Columna Preguntas */
        #quiz-section { width: 400px; background: white; padding: 20px; overflow-y: auto; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .enunciado { font-weight: bold; font-size: 1.1em; margin-bottom: 20px; line-height: 1.4; }
        .opcion { border: 2px solid #e4e6eb; padding: 12px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; font-size: 0.9em; background: #fff; }
        .opcion:hover { border-color: var(--secondary); background: #f0f7ff; }
        .correcta { background: #e8f5e9 !important; border-color: #4caf50 !important; color: #2e7d32; font-weight: bold; }
        .incorrecta { background: #ffebe9 !important; border-color: #fa3e3e !important; }
        .real-correcta { border: 2px solid #4caf50 !important; background: #f1f8e9; }

        #feedback { margin-top: 15px; padding: 15px; background: #fff9c4; border-left: 5px solid #fbc02d; display: none; font-size: 0.85em; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; display: none; }

        /* Columna Mapa Integrado */
        #map-section { flex-grow: 1; background: #e5e5e5; position: relative; }
        #map-iframe { width: 100%; height: 100%; border: none; display: none; }
        #map-placeholder { height: 100%; display: flex; justify-content: center; align-items: center; color: #888; text-align: center; padding: 40px; font-style: italic; }

        @media (max-width: 1024px) {
            main { flex-direction: column; }
            #quiz-section { width: 100%; height: 60%; }
            #map-section { height: 40%; }
        }
    </style>
</head>
<body>

<!-- Pantalla de Contraseña -->
<div id="login-overlay">
    <div style="font-size: 50px;">🚒</div>
    <h2>OPOSICIÓN BOMBEROS MADRID</h2>
    <p>Introduce la contraseña para acceder</p>
    <input type="password" id="pass-input" placeholder="Contraseña..." onkeypress="checkEnter(event)">
    <button onclick="validatePass()" style="margin-top:10px; padding:8px 20px; cursor:pointer;">Entrar</button>
</div>

<header>
    <div><strong>4.1.1.2 ORIENTACIÓN</strong></div>
    <div id="stats" style="font-size: 0.85em;">Cargando datos...</div>
</header>

<main id="app-content" style="visibility: hidden;">
    <section id="quiz-section">
        <div id="enunciado" class="enunciado"></div>
        <div id="opciones"></div>
        <div id="feedback"></div>
        <button class="btn-next" onclick="proximaPregunta()">SIGUIENTE PREGUNTA →</button>
    </section>

    <section id="map-section">
        <div id="map-placeholder">
            Responde para visualizar el recorrido literal en este panel
        </div>
        <!-- El mapa se cargará aquí -->
        <iframe id="map-iframe" allowfullscreen src=""></iframe>
    </section>
</main>

<script>
    const CLAVE_ACCESO = "Madrid2025"; // CAMBIA TU CONTRASEÑA AQUÍ
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnSOPfF6m1OGAqN0j6GqnU6jGuoe7nFbtSE_FjwCz6Clx71hW5vGAcHYgH8B8yCQFJakRkLPRfM1H-/pub?gid=2090000542&single=true&output=csv';

    let db = [];
    let indexActual = 0;
    let puntos = 0;

    function checkEnter(e) { if (e.key === 'Enter') validatePass(); }

    function validatePass() {
        const input = document.getElementById('pass-input').value;
        if (input === CLAVE_ACCESO) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').style.visibility = 'visible';
            cargarDatos();
        } else {
            alert("Contraseña incorrecta");
        }
    }

    async function cargarDatos() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            parsearCSV(data);
        } catch (e) { alert("Error al conectar con Google Sheets"); }
    }

    function parsearCSV(texto) {
        const lineas = texto.split(/\r?\n/);
        const separador = lineas[0].includes(';') ? ';' : ',';
        for (let i = 1; i < lineas.length; i++) {
            const c = lineas[i].split(separador).map(s => s.replace(/^"|"$/g, '').trim());
            if (c.length >= 6) {
                db.push({ id: c[0], enunciado: c[1], opciones: [c[2], c[3], c[4]], correcta: c[5].toUpperCase(), comentarios: c[6], url: c[7] });
            }
        }
        db.sort(() => Math.random() - 0.5);
        actualizarHeader();
        mostrarPregunta();
    }

    function mostrarPregunta() {
        const p = db[indexActual];
        document.getElementById('enunciado').innerText = p.enunciado;
        document.getElementById('feedback').style.display = 'none';
        document.querySelector('.btn-next').style.display = 'none';
        document.getElementById('map-iframe').style.display = 'none';
        document.getElementById('map-placeholder').style.display = 'flex';
        
        const cont = document.getElementById('opciones');
        cont.innerHTML = '';
        ['A', 'B', 'C'].forEach((letra, i) => {
            const div = document.createElement('div');
            div.className = 'opcion';
            div.innerText = p.opciones[i];
            div.onclick = () => verificar(letra, div);
            cont.appendChild(div);
        });
        actualizarHeader();
    }

    function verificar(letra, div) {
        const p = db[indexActual];
        const todas = document.querySelectorAll('.opcion');
        todas.forEach(o => o.style.pointerEvents = 'none');
        const idxCorrecto = p.correcta === 'A' ? 0 : p.correcta === 'B' ? 1 : 2;

        if (letra === p.correcta) {
            div.classList.add('correcta');
            puntos += 1;
        } else {
            div.classList.add('incorrecta');
            todas[idxCorrecto].classList.add('real-correcta');
            puntos -= 0.33;
        }

        document.getElementById('feedback').innerHTML = `<strong>ID: ${p.id}</strong><br>${p.comentarios}`;
        document.getElementById('feedback').style.display = 'block';
        document.querySelector('.btn-next').style.display = 'block';

        // INTEGRACIÓN DEL MAPA
        if (p.url) {
            const embedUrl = p.url.replace("google.com/maps/dir/", "google.com/maps/embed/v1/directions") 
                             // Nota: Google requiere API Key para Embed formal. 
                             // Truco para visualizar sin API Key usando modo búsqueda:
                             const query = encodeURIComponent(p.opciones[idxCorrecto]);
            document.getElementById('map-placeholder').style.display = 'none';
            document.getElementById('map-iframe').style.display = 'block';
            // Intentamos cargar la ruta. Si falla, el usuario puede hacer clic en un enlace externo.
            document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${query}&output=embed&t=m&z=14`;
        }
    }

    function proximaPregunta() {
